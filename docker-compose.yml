version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gamehub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: gamehub
      DB_USER: postgres
      DB_PASSWORD: postgres

volumes:
  pgdata:
